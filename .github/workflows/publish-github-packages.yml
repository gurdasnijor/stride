name: Publish GitHub Packages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version-suffix:
        description: Prerelease suffix, no leading dash. Empty uses macos-stabilize-<sha>.
        default: ''
        type: string
      platform-windows:
        description: Include Windows packages
        default: false
        type: boolean
      platform-linux:
        description: Include Linux packages
        default: true
        type: boolean
      platform-macos:
        description: Include macOS packages
        default: true
        type: boolean
      platform-android:
        description: Include Android packages
        default: false
        type: boolean
      platform-ios:
        description: Include iOS packages
        default: false
        type: boolean
      upload-artifact:
        description: Upload the produced .nupkg files as a workflow artifact
        default: true
        type: boolean

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  Publish:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          lfs: true
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version suffix
        id: suffix
        shell: pwsh
        run: |
          $suffix = '${{ github.event_name == 'workflow_dispatch' && inputs.version-suffix || '' }}'.Trim()
          if ([string]::IsNullOrWhiteSpace($suffix)) {
            $headSha = '${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}'
            if ([string]::IsNullOrWhiteSpace($headSha) -or $headSha.Length -lt 9) {
              echo "::error::Unable to resolve commit SHA for package suffix."
              exit 1
            }
            $suffix = "macos-stabilize-$($headSha.Substring(0, 9))"
          }
          if ($suffix -notmatch '^[0-9A-Za-z][0-9A-Za-z.-]*$') {
            echo "::error::Invalid prerelease suffix '$suffix'. Use letters, digits, dots, and hyphens; do not include the leading dash."
            exit 1
          }
          echo "value=$suffix" >> $env:GITHUB_OUTPUT
          echo "::notice::Publishing Stride packages with prerelease suffix '$suffix'"

      - name: Install Apple Workloads
        if: ${{ github.event_name == 'workflow_run' || inputs.platform-ios || inputs.platform-macos }}
        uses: ./.github/actions/stride-workload
        with:
          workloads: ${{ github.event_name == 'workflow_run' && 'macos' || (inputs.platform-ios && inputs.platform-macos && 'ios macos' || inputs.platform-ios && 'ios' || 'macos') }}

      - name: Build packages
        shell: pwsh
        run: |
          $isDispatch = '${{ github.event_name }}' -eq 'workflow_dispatch'
          $platformWindows = $isDispatch -and '${{ inputs.platform-windows }}' -eq 'true'
          $platformLinux = (-not $isDispatch) -or '${{ inputs.platform-linux }}' -eq 'true'
          $platformMacOS = (-not $isDispatch) -or '${{ inputs.platform-macos }}' -eq 'true'
          $platformAndroid = $isDispatch -and '${{ inputs.platform-android }}' -eq 'true'
          $platformIOS = $isDispatch -and '${{ inputs.platform-ios }}' -eq 'true'

          $platforms = @()
          if ($platformWindows) { $platforms += "Windows" }
          if ($platformLinux) { $platforms += "Linux" }
          if ($platformAndroid) { $platforms += "Android" }
          if ($platformIOS) { $platforms += "iOS" }
          if ($platformMacOS) { $platforms += "macOS" }
          $platforms = $platforms -join ";"
          if ([string]::IsNullOrWhiteSpace($platforms)) {
            echo "::error::At least one platform must be selected."
            exit 1
          }
          $packageTarget = "Package"
          $maxCpuCount = "-m"
          if (-not $platformWindows) {
            $packageTarget = "CodeOnlyPackages"
            $maxCpuCount = "-m:1"
          }
          echo "Building for platforms: $platforms"
          echo "Package target: $packageTarget"
          dotnet build build\Stride.build `
            -t:$packageTarget `
            --no-restore `
            $maxCpuCount -nr:false `
            -p:StridePlatforms=$($platforms.Replace(';','%3B')) `
            -p:StrideGraphicsApiDependentBuildAll=true `
            -p:StrideSign=false `
            -p:StrideVersionSuffix=${{ steps.suffix.outputs.value }} `
            -p:StrideBuildPrerequisitesInstaller=false `
            -p:StrideNativeBuildMode=Clang
        env:
          StrideDisableAssetCompilerExecServerProxy: true

      - name: List packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path bin/packages -Filter "*.nupkg" | Sort-Object Name
          if (-not $packages) {
            echo "::error::No packages were produced."
            exit 1
          }
          echo "## Packages" >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
          $packages | ForEach-Object { echo $_.Name >> $env:GITHUB_STEP_SUMMARY }
          echo '```' >> $env:GITHUB_STEP_SUMMARY

      - name: Validate code-only template package
        shell: pwsh
        run: |
          $template = Get-ChildItem -Path bin/packages -Filter "Stride.Templates.CodeOnly.*-${{ steps.suffix.outputs.value }}.nupkg" | Sort-Object Name | Select-Object -Last 1
          if (-not $template) {
            $template = Get-ChildItem -Path bin/packages -Filter "Stride.Templates.CodeOnly.*.nupkg" | Sort-Object LastWriteTimeUtc | Select-Object -Last 1
          }
          if (-not $template) {
            echo "::error::Stride.Templates.CodeOnly package was not produced."
            exit 1
          }

          $work = Join-Path $env:RUNNER_TEMP "stride-codeonly-template-smoke"
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $work | Out-Null

          dotnet new uninstall Stride.Templates.CodeOnly 2>$null
          dotnet new install --force $template.FullName
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to install $($template.Name)."
            exit 1
          }

          $project = Join-Path $work "SmokeGame"
          dotnet new stride-macos-fsharp -n SmokeGame -o $project
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to instantiate stride-macos-fsharp."
            exit 1
          }
          if (-not (Test-Path (Join-Path $project "NuGet.config"))) {
            echo "::error::Generated stride-macos-fsharp project did not include NuGet.config."
            exit 1
          }

          $smokeNuGetConfig = Join-Path $work "NuGet.Smoke.config"
          $producedPackages = (Resolve-Path bin/packages).Path
          @"
          <configuration>
            <packageSources>
              <clear />
              <add key="produced" value="$producedPackages" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path $smokeNuGetConfig -Encoding UTF8

          dotnet restore (Join-Path $project "SmokeGame.fsproj") `
            --configfile $smokeNuGetConfig `
            --no-cache
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not restore against the produced packages."
            exit 1
          }

          dotnet build (Join-Path $project "SmokeGame.fsproj") --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not build."
            exit 1
          }
          $debugSkybox = Get-ChildItem -Path (Join-Path $project "bin/Debug/net10.0") -Recurse -Filter "skybox_texture_hdr.dds" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $debugSkybox) {
            echo "::error::Generated stride-macos-fsharp build output is missing Resources/skybox_texture_hdr.dds."
            exit 1
          }

          dotnet publish (Join-Path $project "SmokeGame.fsproj") -c Release --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not publish."
            exit 1
          }
          $publishSkybox = Get-ChildItem -Path (Join-Path $project "bin/Release/net10.0") -Recurse -Filter "skybox_texture_hdr.dds" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*publish*" } |
            Select-Object -First 1
          if (-not $publishSkybox) {
            echo "::error::Generated stride-macos-fsharp publish output is missing Resources/skybox_texture_hdr.dds."
            exit 1
          }

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          $source = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget add source $source `
            --username "${{ github.actor }}" `
            --password "$env:GITHUB_PACKAGES_TOKEN" `
            --store-password-in-clear-text `
            --name github

          $failed = $false
          Get-ChildItem -Path bin/packages -Filter "*.nupkg" | Sort-Object Name | ForEach-Object {
            echo "Pushing $($_.Name)..."
            dotnet nuget push $_.FullName `
              --source github `
              --api-key "$env:GITHUB_PACKAGES_TOKEN" `
              --timeout 1800 `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) {
              echo "::error::Failed to push $($_.Name)"
              $failed = $true
            }
          }
          if ($failed) {
            exit 1
          }

      - name: Upload package artifact
        if: ${{ github.event_name == 'workflow_run' || inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: github-packages-${{ steps.suffix.outputs.value }}
          path: bin/packages/*.nupkg
          if-no-files-found: error
